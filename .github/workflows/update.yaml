name: Update anime season data

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-anime-season-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update anime season data
        run: npm start
        env:
          MAL_CLIENT_ID: ${{ secrets.MAL_CLIENT_ID }}

      - name: Commit and push detected changes
        shell: bash
        env:
          AUTHOR_EMAIL: ${{ secrets.AUTHOR_EMAIL }}
        run: |
          if [[ -z "$AUTHOR_EMAIL" ]]; then
            echo "::error::Repository secret AUTHOR_EMAIL is not configured"
            exit 1
          fi

          if [[ -z "$(git status --porcelain -- manifest.json catalog)" ]]; then
            echo "No generated changes to commit"
            exit 0
          fi

          git config user.name "KevinAZHD"
          git config user.email "$AUTHOR_EMAIL"
          git add --all -- manifest.json catalog
          git commit -m "Github actions updated anime season data"
          git pull --rebase origin main
          git push origin HEAD:main

name: Node.js CI

on:
  schedule:
    - cron:  '0 22 * * *'
    - cron:  '0 23 * * *'
  workflow_dispatch:

jobs:
  check-timezone:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.tz.outputs.should_run }}
    steps:
      - name: Check if midnight in Madrid
        id: tz
        run: |
          HOUR=$(TZ='Europe/Madrid' date +%H)
          echo "Current hour in Madrid: $HOUR"
          echo "should_run=$( [ "$HOUR" = "00" ] && echo true || echo false )" >> $GITHUB_OUTPUT

  build:
    needs: check-timezone
    if: needs.check-timezone.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Madrid

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm start
        env:
          MAL_CLIENT_ID: ${{ secrets.MAL_CLIENT_ID }}
      - name: Commit detected changes
        uses: EndBug/add-and-commit@v9
        with:
          add: '["manifest.json","catalog"]'
          author_name: "KevinAZHD"
          author_email: "kevin.adan.zamora@gmail.com"
          new_branch: main
          message: "Github actions updated anime season data"
          push: "origin main --set-upstream --force"
